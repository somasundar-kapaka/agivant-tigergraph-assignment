apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
  labels:
    app.kubernetes.io/instance: tg-operator
    app.kubernetes.io/name: tg-operator
  name: tigergraphbackups.graphdb.tigergraph.com
spec:
  group: graphdb.tigergraph.com
  names:
    kind: TigerGraphBackup
    listKind: TigerGraphBackupList
    plural: tigergraphbackups
    shortNames:
    - tgbackup
    singular: tigergraphbackup
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.clusterName
      name: Cluster
      type: string
    - jsonPath: .spec.backupConfig.tag
      name: Tag
      type: string
    - jsonPath: .spec.destination.storage
      name: storage
      type: string
    - jsonPath: .spec.backupConfig.incremental
      name: Incremental
      type: boolean
    - jsonPath: .status.startTime
      name: StartTime
      type: date
    - jsonPath: .status.completionTime
      name: CompletionTime
      type: date
    - jsonPath: .status.conditions[0].type
      name: Status
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: TigerGraphBackup is the Schema for the tigergraphbackups API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: TigerGraphBackupSpec defines the desired state of TigerGraphBackup
            properties:
              backoffRetryPolicy:
                description: |-
                  BackoffRetryPolicy controls the backoff and retry behavior of
                  backup job.
                  Note: this field only works for TigerGraphBackup, if it is set in
                  TigerGraphBackupSchedule, it will be ignored.
                properties:
                  forceDeleteAfterMaxRetries:
                    description: |-
                      If this field is true, the backup CR will be deleted even if
                      the backup clean job failed and cleanPolicy is Delete
                    type: boolean
                  maxRetryDuration:
                    description: |-
                      The maximum retry interval.
                      The format should be like "5s","10m","1h","1h20m5s"
                      Default value is 10m.
                    type: string
                  maxRetryTimes:
                    description: The maximum number of retries, empty means retry
                      forever
                    format: int32
                    minimum: 0
                    type: integer
                  minRetryDuration:
                    description: |-
                      The minimum retry interval after first failure.
                      The format should be like "5s","10m","1h","1h20m5s"
                      Default value is 5s
                    type: string
                type: object
              backupConfig:
                description: |-
                  BackupConfig contains configurations of backup, if you don't provide
                  BackupConfig, default configurations will be used
                properties:
                  baseBackup:
                    description: Set the base backup tag for incremental backup
                    type: string
                  compressLevel:
                    description: |-
                      If CompressLevel is empty, means we don't set it explicitly
                      Available values are BestSpeed, DefaultCompression, BestCompression
                    enum:
                    - BestSpeed
                    - DefaultCompression
                    - BestCompression
                    type: string
                  compressProcessNumber:
                    description: Set the CompressProcessNumber for backup job
                    type: integer
                  incremental:
                    description: Enable incremental backup
                    type: boolean
                  stagingPath:
                    description: Specify the path where the backup files are stored
                      temporarily
                    type: string
                  tag:
                    description: |-
                      Tag specifies tag of the backup. The actual name of the backup
                      will be {TAG}-{TIMESTAMP}. If this field is not specified, the name
                      of this CR will be used as tag.
                    type: string
                  timeout:
                    description: Set the timeout seconds for backup job
                    type: integer
                type: object
              cleanPolicy:
                description: |-
                  CleanPolicy is the cleaning policy for the backup data when the CR
                  is deleted. You can choose from Retain and Delete.
                  * Retain: Is the default behavior, the backup data will be retained
                  when deleting CR
                  * Delete: Delete the backup data when deleting CR.
                enum:
                - Delete
                - Retain
                type: string
              clusterName:
                description: |-
                  ClusterName is the name of the target cluster, the cluster must be
                  in the same namespace. You must provide the name of the cluster
                  that you want to backup
                type: string
              destination:
                description: |-
                  Destination specify the storage of backups. You must specify
                  destination.
                properties:
                  absContainer:
                    description: Configure this field if you choose azureBlob storage
                      container
                    properties:
                      containerName:
                        description: The name of the Azure Blob container used to
                          store backups
                        type: string
                      endpoint:
                        description: |-
                          An Azure Blob optional endpoint URL(hostname only or fully qualified URI, such as https://<account-name>.blob.core.windows.net)
                          that overrides the default generated endpoint for a client.
                        type: string
                      secretKeyName:
                        description: |-
                          a Secret should be created in cluster
                          the secret should contain AccessKeyID and SecretAccessKey
                        type: string
                    required:
                    - containerName
                    type: object
                  gcsBucket:
                    description: Configure this field if you choose gcsBucket storage
                    properties:
                      bucketName:
                        description: The name of the GCS bucket used to store backups
                        type: string
                      endpoint:
                        description: |-
                          An GCS optional endpoint URL(hostname only or fully qualified URI, such as https://storage.googleapis.com/)
                          that overrides the default generated endpoint for a client.
                        type: string
                      secretKeyName:
                        description: |-
                          a Secret should be created in cluster
                          the secret should contain AccessKeyID and SecretAccessKey
                        type: string
                    required:
                    - bucketName
                    type: object
                  local:
                    description: Configure this field if you choose local storage
                    properties:
                      path:
                        description: Path is the local path where the backup files
                          are stored
                        type: string
                    required:
                    - path
                    type: object
                  s3Bucket:
                    description: Configure this field if you choose s3Bucket storage
                    properties:
                      bucketName:
                        description: The name of the S3 bucket used to store backups
                        type: string
                      endpoint:
                        description: |-
                          An S3 optional endpoint URL(hostname only or fully qualified URI, such as https://s3.amazonaws.com/)
                          that overrides the default generated endpoint for a client.
                        type: string
                      roleARN:
                        description: |-
                          Use RoleARN to access S3 bucket
                          Need extra configuration of TigerGraph
                          if you want to use this way to access S3 bucket
                          See [Create TigerGraph cluster with access to S3](../04-manage/backup-and-restore/create-tg-with-access-to-s3.md)
                        type: string
                      secretKeyName:
                        description: |-
                          a Secret should be created in cluster
                          the secret should contain AccessKeyID and SecretAccessKey
                        type: string
                    required:
                    - bucketName
                    type: object
                  storage:
                    description: |-
                      Set the storage type of the backup
                      Available values are local, s3Bucket, gcsBucket, absContainer
                    enum:
                    - local
                    - s3Bucket
                    - gcsBucket
                    - absContainer
                    type: string
                required:
                - storage
                type: object
            required:
            - clusterName
            - destination
            type: object
          status:
            description: TigerGraphBackupStatus defines the observed state of TigerGraphBackup
            properties:
              backOffTimes:
                description: Equal to the number of backup retries after failure
                type: integer
              backupInfo:
                description: BackupInfo contains the information of the backup package
                  created by this CR
                properties:
                  baseBackup:
                    description: The base backup tag of the incremental backup
                    type: string
                  pointInTimeRestoreStartTime:
                    description: The point in time restore start time of the incremental
                      backup
                    type: string
                  sizeBytes:
                    description: The size of the backup package
                    type: string
                  tag:
                    description: |-
                      The actual tag of the backup package
                      Can be used in TigerGraphRestore CR
                    type: string
                  time:
                    description: The time when the backup package is created
                    format: date-time
                    type: string
                  type:
                    description: Is the backup package incremental or full backup
                    type: string
                  version:
                    description: The version of the cluster where the backup package
                      is created
                    type: string
                required:
                - sizeBytes
                - tag
                - time
                - type
                - version
                type: object
              completionTime:
                description: The completion time of the backup job
                format: date-time
                type: string
              conditions:
                description: |-
                  Conditions represent the latest available observations of TigerGraphBackup's state
                  Refer to [Status of Backup and Restore](../04-manage/backup-and-restore/status-of-backup-restore.md)
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              startTime:
                description: The start time of the backup job
                format: date-time
                type: string
              targetReady:
                description: TargetReady is false when target cluster does not exist
                  or not ready for backup
                type: boolean
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
---
